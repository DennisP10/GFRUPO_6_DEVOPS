name: CI

on:
  push:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build y test
        run: ./gradlew build --no-daemon

      - name: Build Executable JAR
        run: ./gradlew bootJar --no-daemon

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Copy JAR to AWS EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "~/app"
          strip_components: 2

      - name: Execute remote SSH commands to launch App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              sudo dnf install docker -y
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ec2-user
            fi
            
            sudo docker stop user-service-app || true
            sudo docker rm user-service-app || true
            
            cd ~/app
            
            cat << 'EOF' > Dockerfile
            FROM eclipse-temurin:25-jre-alpine
            WORKDIR /app
            COPY *.jar app.jar
            EXPOSE 8080
            ENTRYPOINT ["java", "-jar", "app.jar"]
            EOF
            
            sudo docker build -t user-service:latest .
            
            sudo docker run -d \
              --name user-service-app \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL="jdbc:postgresql://${{ secrets.AWS_RDS_HOST }}:5432/postgres?sslmode=require" \
              -e SPRING_DATASOURCE_USERNAME="postgres" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.AWS_DB_PASSWORD }}" \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO="update" \
              user-service:latest